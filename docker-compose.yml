# Local development stack for @hasna/calendar in cloud (PURE REMOTE) mode.
#   docker compose run --rm calendar-migrate     # apply schema first
#   docker compose up --build calendar-serve
# Auth: mint a key with `contracts issue-key --app calendar --scopes calendar:*`
# using the SAME HASNA_CALENDAR_API_SIGNING_KEY and HASNA_CALENDAR_DATABASE_URL.
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: calendar
      POSTGRES_PASSWORD: calendar
      POSTGRES_DB: calendar
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calendar"]
      interval: 5s
      timeout: 3s
      retries: 10

  calendar-migrate:
    build: .
    command: ["bun", "dist/server/index.js", "migrate"]
    environment:
      HASNA_CALENDAR_STORAGE_MODE: remote
      HASNA_CALENDAR_DATABASE_URL: postgres://calendar:calendar@postgres:5432/calendar?sslmode=disable
      HASNA_CALENDAR_API_SIGNING_KEY: dev-signing-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy

  calendar-serve:
    build: .
    ports:
      - "19428:19428"
    environment:
      PORT: "19428"
      HOST: 0.0.0.0
      CALENDAR_NO_OPEN: "true"
      HASNA_CALENDAR_STORAGE_MODE: remote
      HASNA_CALENDAR_DATABASE_URL: postgres://calendar:calendar@postgres:5432/calendar?sslmode=disable
      HASNA_CALENDAR_API_SIGNING_KEY: dev-signing-secret-change-me
    depends_on:
      calendar-migrate:
        condition: service_completed_successfully
